services:
  app:
    build: .
    container_name: pl-dashboard
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      # Persist xlsx data across container restarts
      - ./backend/dumps:/app/backend/dumps
      # Persist ticker data, users, tokens
      - ./backend/data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
