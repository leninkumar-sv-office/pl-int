services:
  app:
    build: .
    container_name: pl-dashboard
    ports:
      - "9999:9999"
    environment:
      - ZERODHA_API_KEY=${ZERODHA_API_KEY}
      - ZERODHA_API_SECRET=${ZERODHA_API_SECRET}
      - ZERODHA_ACCESS_TOKEN=${ZERODHA_ACCESS_TOKEN}
      - ZERODHA_USER_ID=${ZERODHA_USER_ID}
      - ZERODHA_PASSWORD=${ZERODHA_PASSWORD}
      - ZERODHA_TOTP_SECRET=${ZERODHA_TOTP_SECRET}
      - AUTH_MODE=${AUTH_MODE}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_DRIVE_DUMPS_FOLDER_ID=${GOOGLE_DRIVE_DUMPS_FOLDER_ID}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL}
      - NOTIFICATION_EMAIL_APP_PASSWORD=${NOTIFICATION_EMAIL_APP_PASSWORD}
      - USER_EMAIL=${USER_EMAIL}
      - TERM=xterm-256color
      - FORCE_COLOR=1
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount Google Drive synced folder — all file changes auto-sync to Drive
      - /Users/lenin/Library/CloudStorage/GoogleDrive-${USER_EMAIL}/My Drive/pl/dumps:/app/backend/dumps
      - ./backend/data:/app/backend/data
    tty: true
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
