name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create auto-increment tag
        id: tag
        run: |
          # Find latest prod-N tag
          latest=$(git tag -l 'prod-*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#prod-}
            next=$((num + 1))
          fi
          tag="prod-${next}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Created tag: $tag"

      - name: Deploy to pl-auto
        env:
          DEPLOY_DIR: /Users/lenin/Desktop/workspace/pl-auto
          DUMPS_DIR: /Users/lenin/Desktop/workspace/pl-auto/dumps
          ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          ZERODHA_API_SECRET: ${{ secrets.ZERODHA_API_SECRET }}
          ZERODHA_ACCESS_TOKEN: ${{ secrets.ZERODHA_ACCESS_TOKEN }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          AUTH_MODE: ${{ secrets.AUTH_MODE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_DRIVE_DUMPS_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_DUMPS_FOLDER_ID }}
        run: |
          # Create deploy dir if first time
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            git clone "$GITHUB_WORKSPACE" "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            git remote set-url origin https://github.com/leninkumar-sv-office/pl-int.git
          fi

          cd "$DEPLOY_DIR"
          git fetch origin --tags
          git reset --hard HEAD
          git clean -fd
          git checkout ${{ steps.tag.outputs.tag }}

          # Create dumps directory on host
          mkdir -p "$DUMPS_DIR"

          # Seed dumps from dev workspace if empty (first deploy only)
          DEV_DUMPS="/Users/lenin/Desktop/workspace/pl/backend/dumps"
          if [ -d "$DEV_DUMPS" ] && [ -n "$(ls -A "$DEV_DUMPS" 2>/dev/null)" ]; then
            rsync -a --ignore-existing "$DEV_DUMPS/" "$DUMPS_DIR/"
            echo "Synced dumps data to $DUMPS_DIR"
          fi

          # Kill any non-Docker process on port 8000
          lsof -ti:8000 -sTCP:LISTEN | while read pid; do
            cmd=$(ps -p "$pid" -o comm= 2>/dev/null)
            if [ "$cmd" != "com.docker.ba" ] && [ "$cmd" != "vpnkit-bridge" ]; then
              kill -9 "$pid" 2>/dev/null || true
            fi
          done
          sleep 1

          # Graceful shutdown of existing container
          docker compose stop --timeout 30 2>/dev/null || true
          docker compose down --remove-orphans 2>/dev/null || true

          # Deploy — secrets are passed as env vars via docker-compose.yml
          docker compose up -d --build

      - name: Health check
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 12); do
            status=$(docker inspect --format='{{.State.Health.Status}}' pl-dashboard 2>/dev/null || echo "starting")
            echo "  Attempt $i/12: $status"
            if [ "$status" = "healthy" ]; then
              echo "Container is healthy!"
              curl -s http://localhost:8000/health | python3 -m json.tool
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          echo "--- Container logs ---"
          docker compose -f /Users/lenin/Desktop/workspace/pl-auto/docker-compose.yml logs --tail=50
          exit 1
