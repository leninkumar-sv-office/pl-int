name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deploy mode'
        required: true
        default: 'docker'
        type: choice
        options:
          - docker
          - app

permissions:
  contents: write

jobs:
  # Run tests first (backend + frontend in parallel)
  tests:
    uses: ./.github/workflows/test.yml

  tag:
    needs: tests
    runs-on: self-hosted
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      prev_tag: ${{ steps.tag.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create auto-increment tag
        id: tag
        run: |
          latest=$(git tag -l 'prod-*' --sort=-v:refname | head -1)
          echo "prev_tag=${latest}" >> "$GITHUB_OUTPUT"

          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#prod-}
            next=$((num + 1))
          fi
          tag="prod-${next}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Created tag: $tag (previous: ${latest:-none})"

  deploy:
    needs: tag
    runs-on: self-hosted
    env:
      DOCKER_HOST: unix:///Users/lenin/.docker/run/docker.sock
      DEPLOY_DIR: /Users/lenin/Desktop/workspace/pl-auto
      DEV_DUMPS: /Users/lenin/Desktop/workspace/pl/backend/dumps
      USER_EMAIL: leninkumar.sv.ai@gmail.com
      DEPLOY_MODE: ${{ github.event.inputs.mode || 'docker' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stop old deployment
        run: |
          echo "Stopping old deployment..."

          # Stop Docker container by name (always works regardless of directory)
          docker stop pl-dashboard 2>/dev/null || true
          docker rm -f pl-dashboard 2>/dev/null || true

          # Also try docker compose down from deploy dir
          cd "$DEPLOY_DIR" 2>/dev/null && \
            docker compose down --rmi all --remove-orphans 2>/dev/null || true
          docker image prune -f 2>/dev/null || true

          # Kill any process on port 9999
          lsof -ti:9999 -sTCP:LISTEN | while read pid; do
            cmd=$(ps -p "$pid" -o comm= 2>/dev/null)
            if [ "$cmd" != "com.docker.ba" ] && [ "$cmd" != "vpnkit-bridge" ]; then
              kill -9 "$pid" 2>/dev/null || true
            fi
          done
          sleep 1
          echo "Old deployment stopped"

      - name: Clone and prepare
        run: |
          echo "── Deploying ${{ needs.tag.outputs.tag }} (mode: $DEPLOY_MODE) ──"

          # Backup dumps and data before cleaning
          if [ -d "$DEPLOY_DIR" ]; then
            if [ -d "$DEPLOY_DIR/backend/dumps" ]; then
              mkdir -p /tmp/pl-dumps-backup
              cp -a "$DEPLOY_DIR/backend/dumps/." /tmp/pl-dumps-backup/ 2>/dev/null || true
            fi
            if [ -d "$DEPLOY_DIR/backend/data" ]; then
              mkdir -p /tmp/pl-data-backup
              cp -a "$DEPLOY_DIR/backend/data/." /tmp/pl-data-backup/ 2>/dev/null || true
            fi
            rm -rf "$DEPLOY_DIR"
          fi

          # Fresh clone
          git clone "$GITHUB_WORKSPACE" "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          git checkout ${{ needs.tag.outputs.tag }}

          # Restore dumps
          mkdir -p "$DEPLOY_DIR/backend/dumps"
          if [ -d /tmp/pl-dumps-backup ] && [ -n "$(ls -A /tmp/pl-dumps-backup 2>/dev/null)" ]; then
            cp -a /tmp/pl-dumps-backup/. "$DEPLOY_DIR/backend/dumps/"
            echo "Restored dumps from backup"
          fi
          if [ -d "$DEV_DUMPS" ] && [ -n "$(ls -A "$DEV_DUMPS" 2>/dev/null)" ]; then
            rsync -a --ignore-existing "$DEV_DUMPS/" "$DEPLOY_DIR/backend/dumps/"
            echo "Synced dumps from dev workspace"
          fi
          rm -rf /tmp/pl-dumps-backup

          # Restore data dir
          if [ -d /tmp/pl-data-backup ] && [ -n "$(ls -A /tmp/pl-data-backup 2>/dev/null)" ]; then
            cp -a /tmp/pl-data-backup/. "$DEPLOY_DIR/backend/data/"
            echo "Restored data dir from backup"
          fi
          rm -rf /tmp/pl-data-backup

          # Write .env file from GitHub Secrets
          printf '%s\n' \
            "ZERODHA_API_KEY=${{ secrets.ZERODHA_API_KEY }}" \
            "ZERODHA_API_SECRET=${{ secrets.ZERODHA_API_SECRET }}" \
            "ZERODHA_ACCESS_TOKEN=${{ secrets.ZERODHA_ACCESS_TOKEN }}" \
            "ZERODHA_USER_ID=${{ secrets.ZERODHA_USER_ID }}" \
            "ZERODHA_PASSWORD=${{ secrets.ZERODHA_PASSWORD }}" \
            "ZERODHA_TOTP_SECRET=${{ secrets.ZERODHA_TOTP_SECRET }}" \
            "AUTH_MODE=${{ vars.AUTH_MODE }}" \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "ALLOWED_EMAILS=${{ vars.ALLOWED_EMAILS }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "GOOGLE_DRIVE_DUMPS_FOLDER_ID=${{ vars.GOOGLE_DRIVE_DUMPS_FOLDER_ID }}" \
            "NOTIFICATION_EMAIL=${{ vars.NOTIFICATION_EMAIL }}" \
            "NOTIFICATION_EMAIL_APP_PASSWORD=${{ secrets.NOTIFICATION_EMAIL_APP_PASSWORD }}" \
            "USER_EMAIL=$USER_EMAIL" \
            > "$DEPLOY_DIR/.env"
          chmod 600 "$DEPLOY_DIR/.env"

          # Run email-scope migration (idempotent — safe on every deploy)
          if [ -f "$DEPLOY_DIR/backend/scripts/migrate_to_email_scope.py" ]; then
            python3 "$DEPLOY_DIR/backend/scripts/migrate_to_email_scope.py" \
              --email-map "Lenin:leninkumar.sv.ai@gmail.com,Appa:leninkumar.sv.ai@gmail.com,Amma:leninkumar.sv.ai@gmail.com"
          fi

          # Write deploy tag for /api/version endpoint
          echo "${{ needs.tag.outputs.tag }}" > "$DEPLOY_DIR/backend/data/deploy_tag.txt"
          echo "Deploy directory ready (tag: ${{ needs.tag.outputs.tag }})"

      # ── App mode: build frontend + venv + uvicorn ──────────
      - name: Build frontend
        if: env.DEPLOY_MODE == 'app'
        run: |
          cd "$DEPLOY_DIR/frontend"
          npm ci --silent
          npm run build
          echo "Frontend built → frontend/dist/"

      - name: Setup Python venv and install deps
        if: env.DEPLOY_MODE == 'app'
        run: |
          cd "$DEPLOY_DIR/backend"
          python3 -m venv venv
          source venv/bin/activate
          pip install --quiet -r requirements.txt
          echo "Python venv ready"

      - name: Start app server
        if: env.DEPLOY_MODE == 'app'
        run: |
          cd "$DEPLOY_DIR/backend"
          source venv/bin/activate
          set -a; source "$DEPLOY_DIR/.env"; set +a

          # Unset RUNNER_TRACKING_ID so uvicorn survives job cleanup
          (unset RUNNER_TRACKING_ID; nohup python3 -m uvicorn app.main:app \
            --host 0.0.0.0 --port 9999 \
            > "$DEPLOY_DIR/app.log" 2>&1 &)
          sleep 3
          echo "App server started (PID: $(lsof -ti:9999 -sTCP:LISTEN))"

      # ── Docker mode: docker compose ────────────────────────
      - name: Prepare Docker mount directories
        if: env.DEPLOY_MODE == 'docker'
        run: |
          cd "$DEPLOY_DIR"
          echo "Cleaning stale cache files from data mount (preserving persistent files)..."

          # Files to preserve in backend/data/ (tokens, alerts, settings)
          PRESERVE="google_tokens.json alerts.json alert_history.json .jwt_secret users.json deploy_tag.txt"

          # Remove stale cache files (market data, symbol cache, etc.)
          if [ -d backend/data ]; then
            for f in backend/data/*.json; do
              fname=$(basename "$f")
              if echo "$PRESERVE" | grep -qw "$fname"; then
                echo "  Keeping: $fname"
              else
                rm -f "$f"
                echo "  Removed stale: $fname"
              fi
            done
          fi

          echo "Mount directories ready"

      - name: Docker build and start
        if: env.DEPLOY_MODE == 'docker'
        run: |
          cd "$DEPLOY_DIR"
          docker compose --env-file .env up -d --build
          echo "Docker container started"

      # ── Health checks (both modes) ─────────────────────────
      - name: Health check (localhost)
        run: |
          echo "Waiting for app to be healthy..."
          if [ "$DEPLOY_MODE" = "docker" ]; then
            for i in $(seq 1 24); do
              health=$(docker inspect --format='{{.State.Health.Status}}' pl-dashboard 2>/dev/null || echo "starting")
              echo "  Attempt $i/24: $health"
              if [ "$health" = "healthy" ]; then
                echo "Container is healthy!"
                curl -s http://localhost:9999/health | python3 -m json.tool
                exit 0
              fi
              sleep 5
            done
          else
            for i in $(seq 1 24); do
              status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9999/health 2>/dev/null || echo "000")
              echo "  Attempt $i/24: HTTP $status"
              if [ "$status" = "200" ]; then
                echo "App is healthy!"
                curl -s http://localhost:9999/health | python3 -m json.tool
                exit 0
              fi
              sleep 5
            done
          fi
          echo "Health check failed after 2 minutes"
          echo "--- Logs ---"
          if [ "$DEPLOY_MODE" = "docker" ]; then
            docker compose -f "$DEPLOY_DIR/docker-compose.yml" logs --tail=50 2>/dev/null
          else
            tail -50 "$DEPLOY_DIR/app.log" 2>/dev/null
          fi
          exit 1

      - name: Health check (Cloudflare tunnel)
        run: |
          EXPECTED_TAG="${{ needs.tag.outputs.tag }}"
          echo "Checking https://pl.thirumagal.com/health for tag: $EXPECTED_TAG ..."
          for i in $(seq 1 6); do
            status=$(curl -s -o /tmp/tunnel-health.json -w "%{http_code}" https://pl.thirumagal.com/health 2>/dev/null)
            if [ "$status" = "200" ]; then
              actual_tag=$(python3 -c "import json; print(json.load(open('/tmp/tunnel-health.json')).get('tag',''))" 2>/dev/null)
              if [ "$actual_tag" = "$EXPECTED_TAG" ]; then
                echo "Tunnel health check passed! Tag: $actual_tag"
                cat /tmp/tunnel-health.json | python3 -m json.tool
                exit 0
              fi
              echo "  Attempt $i/6: HTTP 200 but tag=$actual_tag (expected $EXPECTED_TAG) — retrying in 5s..."
            else
              echo "  Attempt $i/6: HTTP $status — retrying in 5s..."
            fi
            sleep 5
          done
          echo "Tunnel health check failed — tag mismatch or unreachable"
          cat /tmp/tunnel-health.json 2>/dev/null
          exit 1

      # ── Rollback on failure ────────────────────────────────
      - name: Rollback to previous tag
        if: failure() && needs.tag.outputs.prev_tag != ''
        run: |
          PREV_TAG="${{ needs.tag.outputs.prev_tag }}"
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ROLLBACK: Deploying previous tag $PREV_TAG  "
          echo "╚══════════════════════════════════════════════╝"

          # Stop failed deployment
          lsof -ti:9999 -sTCP:LISTEN | xargs kill -9 2>/dev/null || true
          cd "$DEPLOY_DIR" 2>/dev/null && \
            docker compose down --rmi all --remove-orphans 2>/dev/null || true
          sleep 1

          # Backup data before rollback
          if [ -d "$DEPLOY_DIR/backend/dumps" ]; then
            mkdir -p /tmp/pl-dumps-backup
            cp -a "$DEPLOY_DIR/backend/dumps/." /tmp/pl-dumps-backup/ 2>/dev/null || true
          fi
          if [ -d "$DEPLOY_DIR/backend/data" ]; then
            mkdir -p /tmp/pl-data-backup
            cp -a "$DEPLOY_DIR/backend/data/." /tmp/pl-data-backup/ 2>/dev/null || true
          fi

          # Clone previous tag (cd /tmp first to avoid getcwd errors after rm)
          cd /tmp
          rm -rf "$DEPLOY_DIR"
          git clone "$GITHUB_WORKSPACE" "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          git checkout "$PREV_TAG"

          # Restore data
          mkdir -p "$DEPLOY_DIR/backend/dumps"
          if [ -d /tmp/pl-dumps-backup ]; then
            cp -a /tmp/pl-dumps-backup/. "$DEPLOY_DIR/backend/dumps/" 2>/dev/null || true
            rm -rf /tmp/pl-dumps-backup
          fi
          if [ -d /tmp/pl-data-backup ]; then
            cp -a /tmp/pl-data-backup/. "$DEPLOY_DIR/backend/data/" 2>/dev/null || true
            rm -rf /tmp/pl-data-backup
          fi

          # Write .env
          printf '%s\n' \
            "ZERODHA_API_KEY=${{ secrets.ZERODHA_API_KEY }}" \
            "ZERODHA_API_SECRET=${{ secrets.ZERODHA_API_SECRET }}" \
            "ZERODHA_ACCESS_TOKEN=${{ secrets.ZERODHA_ACCESS_TOKEN }}" \
            "ZERODHA_USER_ID=${{ secrets.ZERODHA_USER_ID }}" \
            "ZERODHA_PASSWORD=${{ secrets.ZERODHA_PASSWORD }}" \
            "ZERODHA_TOTP_SECRET=${{ secrets.ZERODHA_TOTP_SECRET }}" \
            "AUTH_MODE=${{ vars.AUTH_MODE }}" \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "ALLOWED_EMAILS=${{ vars.ALLOWED_EMAILS }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "GOOGLE_DRIVE_DUMPS_FOLDER_ID=${{ vars.GOOGLE_DRIVE_DUMPS_FOLDER_ID }}" \
            "NOTIFICATION_EMAIL=${{ vars.NOTIFICATION_EMAIL }}" \
            "NOTIFICATION_EMAIL_APP_PASSWORD=${{ secrets.NOTIFICATION_EMAIL_APP_PASSWORD }}" \
            "USER_EMAIL=$USER_EMAIL" \
            > "$DEPLOY_DIR/.env"
          chmod 600 "$DEPLOY_DIR/.env"
          echo "$PREV_TAG" > "$DEPLOY_DIR/backend/data/deploy_tag.txt"

          # Deploy previous tag using same mode
          if [ "$DEPLOY_MODE" = "docker" ]; then
            docker compose --env-file .env up -d --build
          else
            cd "$DEPLOY_DIR/frontend" && npm ci --silent && npm run build
            cd "$DEPLOY_DIR/backend"
            python3 -m venv venv && source venv/bin/activate
            pip install --quiet -r requirements.txt
            set -a; source "$DEPLOY_DIR/.env"; set +a
            (unset RUNNER_TRACKING_ID; nohup python3 -m uvicorn app.main:app \
              --host 0.0.0.0 --port 9999 \
              > "$DEPLOY_DIR/app.log" 2>&1 &)
            sleep 3
          fi

          # Verify rollback
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9999/health 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Rollback to $PREV_TAG successful!"
              curl -s http://localhost:9999/health | python3 -m json.tool
              exit 0
            fi
            sleep 5
          done
          echo "Rollback health check failed — manual intervention needed"
