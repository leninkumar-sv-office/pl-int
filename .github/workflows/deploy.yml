name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create auto-increment tag
        id: tag
        run: |
          # Find latest prod-N tag
          latest=$(git tag -l 'prod-*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#prod-}
            next=$((num + 1))
          fi
          tag="prod-${next}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Created tag: $tag"

      - name: Deploy to pl-auto
        env:
          DEPLOY_DIR: /Users/lenin/Desktop/workspace/pl-auto
        run: |
          # Create deploy dir if first time
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            git clone "$GITHUB_WORKSPACE" "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            git remote set-url origin https://github.com/leninkumar-sv-office/pl-int.git
          fi

          cd "$DEPLOY_DIR"
          git fetch origin --tags
          git checkout ${{ steps.tag.outputs.tag }}

          # Copy .env from dev workspace if not present (first deploy only)
          if [ ! -f backend/.env ] && [ -f /Users/lenin/Desktop/workspace/pl/backend/.env ]; then
            cp /Users/lenin/Desktop/workspace/pl/backend/.env backend/.env
            echo "Copied .env from dev workspace"
          fi

          # Deploy as Docker container
          docker compose down --remove-orphans 2>/dev/null || true
          docker compose up -d --build

      - name: Health check
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 12); do
            status=$(docker inspect --format='{{.State.Health.Status}}' pl-dashboard 2>/dev/null || echo "starting")
            echo "  Attempt $i/12: $status"
            if [ "$status" = "healthy" ]; then
              echo "Container is healthy!"
              curl -s http://localhost:8000/health | python3 -m json.tool
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          echo "--- Container logs ---"
          docker compose logs --tail=50
          exit 1
