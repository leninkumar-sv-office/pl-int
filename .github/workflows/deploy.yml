name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create auto-increment tag
        id: tag
        run: |
          # Find latest prod-N tag
          latest=$(git tag -l 'prod-*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#prod-}
            next=$((num + 1))
          fi
          tag="prod-${next}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Created tag: $tag"

      - name: Deploy to pl-auto
        env:
          DEPLOY_DIR: /Users/lenin/Desktop/workspace/pl-auto
          DEV_DUMPS: /Users/lenin/Desktop/workspace/pl/backend/dumps
          PLIST_LABEL: com.pl.dashboard
          PLIST_PATH: /Users/lenin/Library/LaunchAgents/com.pl.dashboard.plist
        run: |
          echo "── Deploying ${{ steps.tag.outputs.tag }} ──"

          # Stop existing app via launchctl
          launchctl bootout gui/$(id -u)/$PLIST_LABEL 2>/dev/null || true
          sleep 2

          # Kill any leftover process on port 8000
          lsof -ti:8000 -sTCP:LISTEN | xargs kill -9 2>/dev/null || true
          sleep 1

          # Backup dumps and data before cleaning
          if [ -d "$DEPLOY_DIR" ]; then
            if [ -d "$DEPLOY_DIR/backend/dumps" ]; then
              mkdir -p /tmp/pl-dumps-backup
              cp -a "$DEPLOY_DIR/backend/dumps/." /tmp/pl-dumps-backup/ 2>/dev/null || true
            fi
            if [ -d "$DEPLOY_DIR/backend/data" ]; then
              mkdir -p /tmp/pl-data-backup
              cp -a "$DEPLOY_DIR/backend/data/." /tmp/pl-data-backup/ 2>/dev/null || true
            fi
            rm -rf "$DEPLOY_DIR"
          fi

          # Fresh clone
          git clone "$GITHUB_WORKSPACE" "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          git checkout ${{ steps.tag.outputs.tag }}

          # Restore dumps
          mkdir -p "$DEPLOY_DIR/backend/dumps"
          if [ -d /tmp/pl-dumps-backup ] && [ -n "$(ls -A /tmp/pl-dumps-backup 2>/dev/null)" ]; then
            cp -a /tmp/pl-dumps-backup/. "$DEPLOY_DIR/backend/dumps/"
            echo "Restored dumps from backup"
          fi
          if [ -d "$DEV_DUMPS" ] && [ -n "$(ls -A "$DEV_DUMPS" 2>/dev/null)" ]; then
            rsync -a --ignore-existing "$DEV_DUMPS/" "$DEPLOY_DIR/backend/dumps/"
            echo "Synced dumps from dev workspace"
          fi
          rm -rf /tmp/pl-dumps-backup

          # Restore data dir
          if [ -d /tmp/pl-data-backup ] && [ -n "$(ls -A /tmp/pl-data-backup 2>/dev/null)" ]; then
            cp -a /tmp/pl-data-backup/. "$DEPLOY_DIR/backend/data/"
            echo "Restored data dir from backup"
          fi
          rm -rf /tmp/pl-data-backup

          # Write .env file from GitHub Secrets
          printf '%s\n' \
            "ZERODHA_API_KEY=${{ secrets.ZERODHA_API_KEY }}" \
            "ZERODHA_API_SECRET=${{ secrets.ZERODHA_API_SECRET }}" \
            "ZERODHA_ACCESS_TOKEN=${{ secrets.ZERODHA_ACCESS_TOKEN }}" \
            "ZERODHA_USER_ID=${{ secrets.ZERODHA_USER_ID }}" \
            "ZERODHA_PASSWORD=${{ secrets.ZERODHA_PASSWORD }}" \
            "ZERODHA_TOTP_SECRET=${{ secrets.ZERODHA_TOTP_SECRET }}" \
            "AUTH_MODE=${{ secrets.AUTH_MODE }}" \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "GOOGLE_DRIVE_DUMPS_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_DUMPS_FOLDER_ID }}" \
            > "$DEPLOY_DIR/.env"
          chmod 600 "$DEPLOY_DIR/.env"
          echo ".env written with secrets"

          # Build frontend
          echo "── Building frontend ──"
          cd "$DEPLOY_DIR/frontend"
          npm install --silent 2>/dev/null
          npm run build
          echo "Frontend built"

          # Setup Python venv and install deps
          echo "── Setting up Python environment ──"
          cd "$DEPLOY_DIR/backend"
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          deactivate
          echo "Python deps installed"

          # Create LaunchAgent plist — runs venv python directly with env vars baked in
          VENV_PYTHON="$DEPLOY_DIR/backend/venv/bin/python3"

          cat > "$PLIST_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key>
            <string>${PLIST_LABEL}</string>
            <key>ProgramArguments</key>
            <array>
              <string>${VENV_PYTHON}</string>
              <string>-m</string>
              <string>uvicorn</string>
              <string>app.main:app</string>
              <string>--host</string>
              <string>0.0.0.0</string>
              <string>--port</string>
              <string>8000</string>
            </array>
            <key>WorkingDirectory</key>
            <string>${DEPLOY_DIR}/backend</string>
            <key>EnvironmentVariables</key>
            <dict>
              <key>PATH</key>
              <string>${DEPLOY_DIR}/backend/venv/bin:/usr/local/bin:/usr/bin:/bin</string>
              <key>VIRTUAL_ENV</key>
              <string>${DEPLOY_DIR}/backend/venv</string>
              <key>ZERODHA_API_KEY</key>
              <string>${{ secrets.ZERODHA_API_KEY }}</string>
              <key>ZERODHA_API_SECRET</key>
              <string>${{ secrets.ZERODHA_API_SECRET }}</string>
              <key>ZERODHA_ACCESS_TOKEN</key>
              <string>${{ secrets.ZERODHA_ACCESS_TOKEN }}</string>
              <key>ZERODHA_USER_ID</key>
              <string>${{ secrets.ZERODHA_USER_ID }}</string>
              <key>ZERODHA_PASSWORD</key>
              <string>${{ secrets.ZERODHA_PASSWORD }}</string>
              <key>ZERODHA_TOTP_SECRET</key>
              <string>${{ secrets.ZERODHA_TOTP_SECRET }}</string>
              <key>AUTH_MODE</key>
              <string>${{ secrets.AUTH_MODE }}</string>
              <key>GOOGLE_CLIENT_ID</key>
              <string>${{ secrets.GOOGLE_CLIENT_ID }}</string>
              <key>ALLOWED_EMAILS</key>
              <string>${{ secrets.ALLOWED_EMAILS }}</string>
              <key>GOOGLE_CLIENT_SECRET</key>
              <string>${{ secrets.GOOGLE_CLIENT_SECRET }}</string>
              <key>GOOGLE_DRIVE_DUMPS_FOLDER_ID</key>
              <string>${{ secrets.GOOGLE_DRIVE_DUMPS_FOLDER_ID }}</string>
            </dict>
            <key>RunAtLoad</key>
            <true/>
            <key>KeepAlive</key>
            <true/>
            <key>StandardOutPath</key>
            <string>${DEPLOY_DIR}/app.log</string>
            <key>StandardErrorPath</key>
            <string>${DEPLOY_DIR}/app.log</string>
          </dict>
          </plist>
          EOF
          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' "$PLIST_PATH"
          echo "LaunchAgent plist written"

          # Clear old log
          > "$DEPLOY_DIR/app.log"

          # Load and start the app via launchctl
          launchctl bootstrap gui/$(id -u) "$PLIST_PATH"
          echo "App started via LaunchAgent"

      - name: Health check
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "App is healthy! (attempt $i/30)"
              curl -s http://localhost:8000/health | python3 -m json.tool
              exit 0
            fi
            echo "  Attempt $i/30: not ready yet"
            sleep 5
          done
          echo "Health check failed after 2.5 minutes"
          echo "--- App logs ---"
          tail -50 /Users/lenin/Desktop/workspace/pl-auto/app.log 2>/dev/null || echo "No logs found"
          echo "--- LaunchAgent status ---"
          launchctl list | grep pl || echo "Not loaded"
          exit 1
