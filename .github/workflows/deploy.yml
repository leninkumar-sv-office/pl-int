name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create auto-increment tag
        id: tag
        run: |
          # Find latest prod-N tag
          latest=$(git tag -l 'prod-*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#prod-}
            next=$((num + 1))
          fi
          tag="prod-${next}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Created tag: $tag"

      - name: Deploy to pl-auto
        env:
          DEPLOY_DIR: /Users/lenin/Desktop/workspace/pl-auto
          DEV_DUMPS: /Users/lenin/Desktop/workspace/pl/backend/dumps
        run: |
          echo "── Deploying ${{ steps.tag.outputs.tag }} ──"

          # Kill any existing process on port 8000
          lsof -ti:8000 -sTCP:LISTEN | xargs kill -9 2>/dev/null || true
          sleep 1

          # Backup dumps and data before cleaning
          if [ -d "$DEPLOY_DIR" ]; then
            if [ -d "$DEPLOY_DIR/backend/dumps" ]; then
              mkdir -p /tmp/pl-dumps-backup
              cp -a "$DEPLOY_DIR/backend/dumps/." /tmp/pl-dumps-backup/ 2>/dev/null || true
            fi
            if [ -d "$DEPLOY_DIR/backend/data" ]; then
              mkdir -p /tmp/pl-data-backup
              cp -a "$DEPLOY_DIR/backend/data/." /tmp/pl-data-backup/ 2>/dev/null || true
            fi
            rm -rf "$DEPLOY_DIR"
          fi

          # Fresh clone
          git clone "$GITHUB_WORKSPACE" "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          git checkout ${{ steps.tag.outputs.tag }}

          # Restore dumps
          mkdir -p "$DEPLOY_DIR/backend/dumps"
          if [ -d /tmp/pl-dumps-backup ] && [ -n "$(ls -A /tmp/pl-dumps-backup 2>/dev/null)" ]; then
            cp -a /tmp/pl-dumps-backup/. "$DEPLOY_DIR/backend/dumps/"
            echo "Restored dumps from backup"
          fi
          if [ -d "$DEV_DUMPS" ] && [ -n "$(ls -A "$DEV_DUMPS" 2>/dev/null)" ]; then
            rsync -a --ignore-existing "$DEV_DUMPS/" "$DEPLOY_DIR/backend/dumps/"
            echo "Synced dumps from dev workspace"
          fi
          rm -rf /tmp/pl-dumps-backup

          # Restore data dir
          if [ -d /tmp/pl-data-backup ] && [ -n "$(ls -A /tmp/pl-data-backup 2>/dev/null)" ]; then
            cp -a /tmp/pl-data-backup/. "$DEPLOY_DIR/backend/data/"
            echo "Restored data dir from backup"
          fi
          rm -rf /tmp/pl-data-backup

          # Write .env file from GitHub Secrets
          printf '%s\n' \
            "ZERODHA_API_KEY=${{ secrets.ZERODHA_API_KEY }}" \
            "ZERODHA_API_SECRET=${{ secrets.ZERODHA_API_SECRET }}" \
            "ZERODHA_ACCESS_TOKEN=${{ secrets.ZERODHA_ACCESS_TOKEN }}" \
            "ZERODHA_USER_ID=${{ secrets.ZERODHA_USER_ID }}" \
            "ZERODHA_PASSWORD=${{ secrets.ZERODHA_PASSWORD }}" \
            "ZERODHA_TOTP_SECRET=${{ secrets.ZERODHA_TOTP_SECRET }}" \
            "AUTH_MODE=${{ secrets.AUTH_MODE }}" \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "GOOGLE_DRIVE_DUMPS_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_DUMPS_FOLDER_ID }}" \
            > "$DEPLOY_DIR/.env"
          chmod 600 "$DEPLOY_DIR/.env"
          echo ".env written with secrets"

          # Build frontend
          echo "── Building frontend ──"
          cd "$DEPLOY_DIR/frontend"
          npm install --silent 2>/dev/null
          npm run build
          echo "Frontend built"

          # Setup Python venv and install deps
          echo "── Setting up Python environment ──"
          cd "$DEPLOY_DIR/backend"
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          deactivate
          echo "Python deps installed"

          # Write startup script
          cat > "$DEPLOY_DIR/start.sh" <<'STARTEOF'
          #!/bin/bash
          cd /Users/lenin/Desktop/workspace/pl-auto/backend
          source venv/bin/activate
          set -a
          source /Users/lenin/Desktop/workspace/pl-auto/.env
          set +a
          exec python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000
          STARTEOF
          sed -i '' 's/^          //' "$DEPLOY_DIR/start.sh"
          chmod +x "$DEPLOY_DIR/start.sh"

          # Clear old log
          > "$DEPLOY_DIR/app.log"

          # Start app — unset RUNNER_TRACKING_ID so runner won't kill it on job end
          echo "── Starting app ──"
          (unset RUNNER_TRACKING_ID; nohup bash "$DEPLOY_DIR/start.sh" >> "$DEPLOY_DIR/app.log" 2>&1 &)
          sleep 2
          echo "App process started"
          lsof -ti:8000 -sTCP:LISTEN && echo "Port 8000 is listening" || echo "Waiting for port 8000..."

      - name: Health check
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "App is healthy! (attempt $i/30)"
              curl -s http://localhost:8000/health | python3 -m json.tool
              exit 0
            fi
            echo "  Attempt $i/30: not ready yet"
            sleep 5
          done
          echo "Health check failed after 2.5 minutes"
          echo "--- App logs ---"
          tail -50 /Users/lenin/Desktop/workspace/pl-auto/app.log 2>/dev/null || echo "No logs found"
          echo "--- Port 8000 ---"
          lsof -ti:8000 || echo "Nothing on port 8000"
          exit 1

      - name: Verify app persists after job
        run: |
          PID=$(lsof -ti:8000 -sTCP:LISTEN 2>/dev/null || true)
          if [ -n "$PID" ]; then
            echo "App running with PID $PID — will persist after job ends"
            echo "$PID" > /Users/lenin/Desktop/workspace/pl-auto/app.pid
          else
            echo "WARNING: App not detected on port 8000"
          fi
