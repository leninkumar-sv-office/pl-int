name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  # Backend and frontend tests run IN PARALLEL (no 'needs:' dependency)
  backend-tests:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv and install deps
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          pip install pytest-xdist --quiet  # parallel test execution

      - name: Create frontend dist stub for StaticFiles mount
        run: mkdir -p ../frontend/dist/assets

      - name: Run backend tests with coverage (parallel)
        run: |
          source venv/bin/activate
          python -m pytest tests/ \
            -n auto \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html:coverage-html \
            -v --tb=short
        env:
          AUTH_MODE: local
          ZERODHA_API_KEY: ""
          ZERODHA_API_SECRET: ""

  frontend-tests:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --silent

      - name: Run frontend tests with coverage (parallel)
        run: npx vitest run --reporter=verbose --pool=threads
