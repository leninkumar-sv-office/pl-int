name: Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  backend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests
        run: |
          cd backend
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          pip install pytest-xdist --quiet
          mkdir -p ../frontend/dist/assets
          AUTH_MODE=local ZERODHA_API_KEY="" ZERODHA_API_SECRET="" \
            python -m pytest tests/ --cov=app --cov-report=term -v --tb=short

  frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run frontend tests
        run: |
          cd frontend
          npm install --silent
          npx vitest run --reporter=verbose --pool=threads
